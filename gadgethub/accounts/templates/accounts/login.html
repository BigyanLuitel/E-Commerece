{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-panel">
    <h1 class="page-title mb-1">Welcome back</h1>
    <p class="page-sub mb-4">Log in to your GadgetHub account.</p>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-accent w-100">Login</button>
    </form>
</div>
{% endblock %}
