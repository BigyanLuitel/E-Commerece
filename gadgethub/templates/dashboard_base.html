{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} — GadgetHub Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    <link href="{% static 'css/dashboard.css' %}" rel="stylesheet">
</head>
<body class="dash-body">
    <div class="dash-shell">
        <aside class="dash-sidebar">
            <div class="dash-brand">GadgetHub <span>Admin</span></div>
            <nav class="dash-nav">
                <a href="{% url 'dashboard:home' %}" class="dash-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}">Overview</a>
<a href="{% url 'dashboard:product_list' %}" class="dash-link {% if 'product' in request.resolver_match.url_name %}active{% endif %}">Products</a>               
 <a href="{% url 'dashboard:order_list' %}" class="dash-link {% if 'order' in request.resolver_match.url_name %}active{% endif %}">Orders</a>
                <a href="#" class="dash-link dash-link-ai">AI Tools</a>
            </nav>
            <div class="dash-sidebar-footer">
                <span class="dash-user">{{ user.email }}</span>
                <form method="post" action="{% url 'accounts:logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-outline-ink w-100 mt-2">Logout</button>
                </form>
            </div>
        </aside>

        <main class="dash-main">
            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
